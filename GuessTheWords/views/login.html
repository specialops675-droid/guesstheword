<!DOCTYPE html>

<html>

<head>

    <title>
        Guess The Word Login
    </title>
     <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/login.css">

</head>

<body>

    <div class="login">

        <h1>
            Guess The Word
        </h1>

        <div id="loginError" class="error-box">

        </div>

        <form action="/login" method="POST" id="loginForm">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button>
                Login
            </button>

        </form>

        <h3>
            Create Account
        </h3>

        <form action="/register" method="POST">

            <input
                type="text"
                name="username"
                placeholder="New Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="New Password"
                required
            >

            <button>
                Register
            </button>

        </form>

    </div>

    <!-- SUCCESS MODAL -->

    <div id="successModal" class="success-modal">

        <div class="success-content">

            <h2>
                ✅ Registration Successful!
            </h2>

            <p>
                Your account has been created successfully.
            </p>

            <button onclick="closeModal()">
                Continue
            </button>

        </div>

    </div>

    <!-- USERNAME EXISTS MODAL -->

    <div id="existsModal" class="success-modal">

        <div class="success-content">

            <h2>
                ❌ Username Already Exists
            </h2>

            <p>
                Please choose a different username.
            </p>

            <button onclick="closeExistsModal()">
                Continue
            </button>

        </div>

    </div>

    <script>

    const params = new URLSearchParams(
        window.location.search
    );

    if(
        params.get("registered") === "1"
    ){

        document.getElementById(
            "successModal"
        ).style.display = "flex";

    }

    if(
        params.get("exists") === "1"
    ){

        document.getElementById(
            "existsModal"
        ).style.display = "flex";

    }

    const error =
    params.get("error");

    if(error){

        document.getElementById(
            "loginError"
        ).innerHTML =
        "Username or password incorrect";

    }

    function closeModal(){

        document.getElementById(
            "successModal"
        ).style.display = "none";

        window.history.replaceState(
            {},
            document.title,
            "/"
        );

    }

    function closeExistsModal(){

        document.getElementById(
            "existsModal"
        ).style.display = "none";

        window.history.replaceState(
            {},
            document.title,
            "/"
        );

    }

    </script>

</body>

</html>
