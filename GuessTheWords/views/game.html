<!DOCTYPE html>
<html>

<head>

    <title>Guess The Word - Game</title>

    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">

</head>


<body>


<div class="container">


    <div class="game-card">


        <h1>
            Guess The Word
        </h1>



        <h2 id="round">
            Round 0 / 20
        </h2>




        <div class="status-box">


            <h3 id="category">
                Category
            </h3>



            <h1 id="word">
                WORD
            </h1>



            <h2 id="timer">
                Time: 30
            </h2>


        </div>






        <div class="input-area">


            <input 
                type="text"
                id="answerInput"
                placeholder="Enter answer"
            >



            <button id="submitBtn">

                Submit

            </button>


        </div>






        <div id="message">


        </div>








        <div class="players-box">


            <h2>
                Scoreboard
            </h2>



            <div id="scoreboard">


            </div>



        </div>









        <div id="winnerScreen" class="winner-box">


            <h1>
                🎉 GAME OVER 🎉
            </h1>



            <h2 id="winnerName">

            </h2>




            <div id="finalScoreboard">


            </div>





            <button id="playAgainBtn">

                Back To Games

            </button>



        </div>







    </div>


</div>







<script src="/socket.io/socket.io.js"></script>

<script src="/js/game.js"></script>


</body>

</html>
